<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<link rel="stylesheet" href="game.css">
</head>
<body>
<canvas id="canvas"></canvas>
<div id="nameRow">
    <div class="playerInfo">
        <span id="nameLeft">HOST</span>
        <span id="recordLeft">W-L 0-0</span>
    </div>
    <span id="gameTitle">TIC TAC TOE</span>
    <div class="playerInfo">
        <span id="nameRight">AI</span>
        <span id="recordRight">&mdash;</span>
    </div>
</div>
<div id="hud">
    <span id="status">TIC TAC TOE</span>
    <span id="mark">MARK X</span>
</div>
<div id="muteBtn">MUTE</div>
<div id="pauseBtn">-</div>
<div id="restartBtn">PLACE</div>
<div id="overlay">
    <div id="overlayText">TIC TAC TOE<br><span id="overlaySub">press any key to start</span></div>
</div>
<script src="../../shared/bridge.js"></script>
<script src="game.js"></script>
</body>
</html>
