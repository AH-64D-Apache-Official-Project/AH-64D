name = "AH-64D Apache Longbow"
prefix = "fza_ah64"
mainprefix = "x"

[version]
major = 2
minor = 2
patch = 9
build = 2
git_hash = 0

[files]
include = [
    "mod.cpp",
    "apache_mod_logo.paa",
    "apache_mod_picture.paa",
    "APL-ND(LICENSE)",
]

[properties]
author = "AH-64 Development team"

[hemtt.release]
sign = true
archive = true

[lints.config]
math_could_be_unquoted = false

[lints.sqf]
select_parse_number = false

[lints.sqf.var_all_caps]
options.ignore = [
    "ACE_DEFAULT_LASER_WAVELENGTH",
    "P", "Y", "R",
    "PSI", "INPUT",
]

# These strings are used in COCKPIT_CONTROL macros via __EVAL(localize ...)
# which HEMTT cannot trace for stringtable usage analysis
[lints.stringtables.usage]
options.ignore = [
    "str_fza_ah64_activate_keyboard_unit_toggle",
    "str_fza_ah64_armament_panel",
    "str_fza_ah64_door",
    "str_fza_ah64_emergency_panel",
    "str_fza_ah64_engine_panel",
    "str_fza_ah64_fire_panel",
    "str_fza_ah64_ihadss",
    "str_fza_ah64_keyboard_unit",
    "str_fza_ah64_lighting",
    "str_fza_ah64_lmpd",
    "str_fza_ah64_master_warning_caution_panel",
    "str_fza_ah64_nvs",
    "str_fza_ah64_rmpd",
]