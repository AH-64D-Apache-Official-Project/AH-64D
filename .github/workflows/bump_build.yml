name: Bump Build Number on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - master
      - main

jobs:
  bump-build:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Increment build number in project.toml
        run: |
          python3 - <<'EOF'
          import re

          path = '.hemtt/project.toml'
          with open(path, 'r') as f:
              content = f.read()

          def increment(match):
              new_val = int(match.group(1)) + 1
              print(f'Bumping build: {match.group(1)} -> {new_val}')
              return f'build = {new_val}'

          new_content = re.sub(r'^build = (\d+)', increment, content, flags=re.MULTILINE)

          with open(path, 'w') as f:
              f.write(new_content)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .hemtt/project.toml
          git commit -m "chore: bump build number [skip ci]"
          git push
